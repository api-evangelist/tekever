aid: tekever
name: Tekever
description: >-
  Tekever is a multinational defence technology company headquartered in
  Lisbon, Portugal, with operations in the United Kingdom (Bath and a
  planned large-scale drone production facility in Swindon), France
  (Toulouse and Cahors), and the United States (Fayetteville, North
  Carolina). Founded in 2001, the company specialises in AI-driven
  autonomy for civil and defence missions, with its core business
  centred on long-endurance Unmanned Aerial Systems (UAS) used for
  Intelligence, Surveillance, and Reconnaissance (ISR), maritime
  surveillance, and electronic warfare. Its flagship platforms include
  the AR3, a configurable medium-range tactical UAS (designated
  StormShroud in service with the UK Royal Air Force), the AR5, a
  SATCOM-enabled long-endurance maritime and land ISR aircraft, and
  the ARX, a next-generation system positioned as the company's game
  changer. These platforms are paired with ATLAS, Tekever's
  real-time intelligence-as-a-service platform that fuses sensor and
  satellite data into actionable mission intelligence. Tekever drones
  are operated by the UK Ministry of Defence, the British Army, the
  Armed Forces of Ukraine (with the UK having committed approximately
  £270 million in Tekever UAVs for Ukraine since the start of the
  Russian invasion), the European Maritime Safety Agency under a
  €30 million contract, the French Ministry of Armed Forces (CNES/DGA),
  Portugal, and NATO. The company also develops satellite technology
  and Synthetic Aperture Radar (SAR) capabilities to extend its
  intelligence services beyond the airborne domain. Tekever's revenue
  model is built on government and defence contracts, platform sales,
  and managed ISR-as-a-service offerings; it does not publish a
  public developer API, SDK, or open-source release, and engagement
  with the company is conducted through direct sales, government
  procurement, and partnership channels.
